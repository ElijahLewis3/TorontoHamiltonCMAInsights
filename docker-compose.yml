version: "3.8"

services:
  mysql:
    image: mysql:8.4
    container_name: mfhe-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: mfhe_db
      MYSQL_USER: mfhe_user
      MYSQL_PASSWORD: mfhe_pass
    volumes:
      - mfhe_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mfhe_mysql_data:
