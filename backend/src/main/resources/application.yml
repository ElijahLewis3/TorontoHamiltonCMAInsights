spring:
  datasource:
    url: jdbc:mysql://localhost:3307/mfhe_db
    username: mfhe_user
    password: mfhe_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080
